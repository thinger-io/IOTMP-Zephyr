# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_DNS_RESOLVER=y

# DHCP
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_GLIBCXX_LIBCPP=y

# Eventfd for cross-thread wakeup
CONFIG_EVENTFD=y

# Thinger IOTMP
CONFIG_THINGER_IOTMP=y
CONFIG_THINGER_IOTMP_LOG_LEVEL_DBG=y

# TLS (optional — comment out for plain TCP)
# CONFIG_THINGER_IOTMP_TLS=y
# CONFIG_MBEDTLS=y
# CONFIG_MBEDTLS_BUILTIN=y
# CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
# CONFIG_MBEDTLS_TLS_VERSION_1_2=y

# Random generator (needed for networking on QEMU)
CONFIG_TEST_RANDOM_GENERATOR=y

# Stack and heap
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
