name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    container: ghcr.io/zephyrproject-rtos/ci:v0.27.4

    strategy:
      fail-fast: false
      matrix:
        board:
          - mps2/an385
          - nucleo_f767zi
          - esp32c3_devkitc
          - nrf52840dk/nrf52840

    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-0.17.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: iotmp-zephyr

      - name: Checkout IOTMP-Embedded
        uses: actions/checkout@v4
        with:
          repository: thinger-io/IOTMP-Embedded
          path: iotmp-embedded

      - name: Initialize Zephyr workspace
        run: |
          pip install west
          rm -rf .west
          west init -l iotmp-zephyr
          west update --narrow -o=--depth=1

      - name: Build (${{ matrix.board }})
        run: |
          west build -p always -b ${{ matrix.board }} iotmp-zephyr/samples/basic \
            -- -DEXTRA_ZEPHYR_MODULES="$(pwd)/iotmp-zephyr;$(pwd)/iotmp-embedded"

      - name: Memory usage
        if: success()
        run: |
          size build/zephyr/zephyr.elf || true
