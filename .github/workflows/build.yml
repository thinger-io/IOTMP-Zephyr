name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/zephyrproject-rtos/ci:v0.27.4

    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-0.17.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: iotmp-zephyr

      - name: Checkout IOTMP-Embedded
        uses: actions/checkout@v4
        with:
          repository: thinger-io/IOTMP-Embedded
          path: iotmp-embedded

      - name: Initialize Zephyr workspace
        run: |
          pip install west
          west init -l iotmp-zephyr
          west update --narrow -o=--depth=1

      - name: Build (mps2/an385 — Cortex-M3, 4MB Flash/RAM)
        run: |
          west build -b mps2/an385 iotmp-zephyr/samples/basic \
            -- -DEXTRA_ZEPHYR_MODULES="$(pwd)/iotmp-zephyr;$(pwd)/iotmp-embedded"

      - name: Memory report
        run: |
          west build -t rom_report 2>/dev/null | tail -20 || true
          cat build/zephyr/zephyr.elf.memory_report.txt 2>/dev/null || true
